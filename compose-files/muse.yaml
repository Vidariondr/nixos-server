services:
  muse:
    image: ghcr.io/museofficial/muse:2.11.4
    container_name: muse
    networks:
      docker_network:
        ipv4_address: ${MUSE_IP}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${MUSE_DISCORD_TOKEN}
      YOUTUBE_API_KEY: ${MUSE_YT_API}
      TZ: ${TZ}
    volumes:
      - "${DOCKERDIR}/appdata/muse:/data"
